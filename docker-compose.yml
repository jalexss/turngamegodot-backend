version: '3.8'

services:
  db:
    image: postgres:15 # Usaremos la versión 15
    container_name: roguelike_postgres
    restart: always
    environment:
      POSTGRES_USER: soleysus
      POSTGRES_PASSWORD: 123456789
      POSTGRES_DB: roguelike_db
    ports:
      - "5432:5432" # Mapea el puerto de Docker al de tu PC
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: # Esto hace que los datos no se borren al apagar el contenedor